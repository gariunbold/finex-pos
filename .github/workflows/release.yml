name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Finex POS ${{ github.ref_name }}"
          releaseBody: "Finex POS шинэ хувилбар гарлаа."
          releaseDraft: false
          prerelease: false

      - name: Remove unnecessary assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $assets = gh release view $tag --json assets --jq ".assets[].name"
          foreach ($asset in $assets -split "`n") {
            $asset = $asset.Trim()
            if ($asset -and -not ($asset -match "(_x64-setup\.exe|latest\.json|\.sig)$")) {
              Write-Host "Removing: $asset"
              gh release delete-asset $tag $asset --yes
            }
          }
        shell: pwsh
